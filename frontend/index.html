<!doctype html>
<html
  lang="ru"
  class="scroll-smooth"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      href="/favicon.ico"
      sizes="any"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <link
      rel="manifest"
      href="/site.webmanifest"
    />

    <!-- Canonical URL (static for initial load, will be updated by SeoHead component) -->
    <link
      rel="canonical"
      href="https://frost-master.com/"
    />

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.frost-master.com https://api.ipify.org; frame-src https://yandex.ru https://*.yandex.ru; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
    />

    <!-- Theme color for mobile browsers -->
    <meta
      name="theme-color"
      content="#405599"
    />
    <meta
      name="msapplication-TileColor"
      content="#405599"
    />

    <!-- Meta robots -->
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <title>Frost-Master — ремонт холодильников в Краснодаре и Адыгее</title>

    <meta
      name="description"
      content="Frost-Master — профессиональный ремонт холодильников в Краснодаре и Адыгее. Наш тел.: +7 (993) 443-39-56. Выезд мастера и диагностика БЕСПЛАТНО при согласии на ремонт. Ежедневно с 8:00 до 22:00. Гарантия 3-12 месяцев. Ремонт всех брендов: Samsung, LG, Bosch, Indesit, Atlant, Beko, Haier и другие."
    />

    <!-- OpenGraph -->
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:site_name"
      content="Frost-Master"
    />
    <meta
      property="og:locale"
      content="ru_RU"
    />

    <!-- Yandex verification -->
    <meta name="yandex-verification" content="196ea4b11cfdba4c" />
    
    <!-- Yandex geo tags -->
    <meta name="geo.region" content="RU-KDA" />
    <meta name="geo.region" content="RU-AD" />
    <meta name="geo.placename" content="Краснодар" />
    <meta name="geo.position" content="45.015511;38.917425" />
    <meta name="ICBM" content="45.015511, 38.917425" />

    <!-- Preferred domain (without www) -->
    <!-- This helps search engines understand which domain version is canonical -->
  </head>
  <body>
    <div
      id="root"
      class="h-screen"
    ><!--ssr-outlet--></div>
    <script
      type="module"
      src="/src/main.jsx"
      defer
    ></script>
  </body>
</html>
